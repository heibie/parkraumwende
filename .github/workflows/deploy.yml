name: Deploy to All-Inkl

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via rsync
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H -p 22 w00973c8.kasserver.com >> ~/.ssh/known_hosts 2>/dev/null

          rsync -az --delete -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=yes" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='scripts' \
            --exclude='cron/_cfg.php' \
            ./ ssh-v148448@w00973c8.kasserver.com:/www/htdocs/v148448/data.parkraumwende.de/
