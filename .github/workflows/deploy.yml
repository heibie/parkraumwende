name: Deploy to All-Inkl

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via rsync
        env:
          SSH_KEY:     ${{ secrets.SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H -p 22 "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          rsync -az --delete -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=yes" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='scripts' \
            --exclude='cron/_cfg.php' \
            --exclude='data/*.sql' \
            --exclude='data/latest.json' \
            --exclude='data/details' \
            --exclude='data/summary' \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH"
