const chartId = new URLSearchParams(location.search).get('chart') || '';
const meta    = CHARTS[chartId];

if (!meta) {
  document.getElementById('e-title').textContent = 'Unbekanntes Diagramm';
  document.getElementById('chart').replaceWith(
    Object.assign(document.createElement('div'), { className: 'e-err', textContent: 'Diagramm nicht gefunden.' })
  );
} else {
  document.getElementById('e-title').textContent  = meta.title;
  document.getElementById('e-sub').textContent    = meta.sub;
  document.getElementById('e-source').textContent = 'Quelle: ' + meta.source;
  meta.init();

// ─── Helpers ──────────────────────────────────────────────────────────────────

function loadCsv(path) {
  return new Promise(resolve =>
    Papa.parse(path, { download: true, header: true, skipEmptyLines: true, complete: r => resolve(r.data) })
  );
}

const trim  = v => String(v ?? '').trim();
const num   = v => parseFloat(trim(v).replace(/\s/g, '')) || 0;
const yTsd  = { ticks: { callback: v => (v / 1000).toFixed(0) + ' Tsd.', font: { size: 11 } }, grid: { color: '#e8ebee' } };
const xBase = { ticks: { font: { size: 11 } }, grid: { display: false } };

// ─── Chart definitions ────────────────────────────────────────────────────────

async function initLizenzgebiete() {
  const rows = await loadCsv('data/parklizenzgebiete.csv');
  const filtered = rows
    .filter(r => r['Lizenzgebiet'] && r['Lizenzgebiet'] !== 'Gesamt' && typeof r['Anzahl Parkausweise'] === 'number')
    .sort((a,b) => (b['Anzahl Parkausweise'] - b['Anzahl Stellplätze']) - (a['Anzahl Parkausweise'] - a['Anzahl Stellplätze']));
  const diff   = filtered.map(r => r['Anzahl Parkausweise'] - r['Anzahl Stellplätze']);
  const colors = diff.map(v => v > 0 ? COLORS.rot : COLORS.blau);
  new Chart(document.getElementById('chart'), {
    type: 'bar',
    data: { labels: filtered.map(r => r['Lizenzgebiet']),
      datasets: [{ label: 'Parkausweise minus Stellplätze', data: diff, backgroundColor: colors, barThickness: 10 }] },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false },
        tooltip: { callbacks: { label: ctx => { const v = ctx.parsed.y; return v > 0 ? ` ${v} Lizenzen ohne Stellplatz` : ` ${Math.abs(v)} Stellplätze ungenutzt`; } } } },
      scales: {
        x: { ticks: { font: { size: 9 }, maxRotation: 90, minRotation: 60 }, grid: { display: false } },
        y: { ticks: { font: { size: 11 } }, grid: { color: '#e8ebee' }, title: { display: true, text: 'Überschuss Parkausweise', font: { size: 10 }, color: '#62707c' } },
      } },
  });
}

async function initParkplaetzeLizenzen() {
  const total = 119227, spots = 93064, overbooked = total - spots;
  const fmt = v => v.toLocaleString('de-DE');
  new Chart(document.getElementById('chart'), {
    type: 'bar',
    data: { labels: ['Parklizenzen gesamt'],
      datasets: [
        { label: 'Verfügbare Parkplätze',  data: [spots],     backgroundColor: COLORS.gruen,           barThickness: 50 },
        { label: 'Vergebene Parklizenzen', data: [overbooked], backgroundColor: 'rgba(199,30,29,0.55)', barThickness: 30 },
      ] },
    options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y',
      plugins: { tooltip: { callbacks: {
        title: ctx => ctx[0].dataset.label,
        label: ctx => ctx.datasetIndex === 1 ? ` ${fmt(ctx.parsed.x)} überbucht (${fmt(total)} Lizenzen gesamt)` : ` ${fmt(ctx.parsed.x)}`,
      } } },
      scales: {
        x: { stacked: true, ticks: { callback: v => v.toLocaleString('de-DE'), font: { size: 11 } }, grid: { color: '#e8ebee' } },
        y: { stacked: true, ticks: { font: { size: 11 } }, grid: { display: false } },
      } },
  });
}

async function initMotelone() {
  const data = [ { label: 'Werktage', frei: 100, belegt: 80 }, { label: 'Wochenende', frei: 140, belegt: 40 } ];
  new Chart(document.getElementById('chart'), {
    type: 'bar',
    plugins: [ChartDataLabels],
    data: { labels: data.map(r => r.label),
      datasets: [
        { label: 'Frei',   data: data.map(r => r.frei),   backgroundColor: COLORS.gruen, barPercentage: 0.75, categoryPercentage: 0.6 },
        { label: 'Belegt', data: data.map(r => r.belegt), backgroundColor: COLORS.rot,   barPercentage: 0.75, categoryPercentage: 0.6 },
      ] },
    options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y',
      plugins: {
        legend: { labels: { font: { size: 11 }, boxWidth: 13, padding: 14 } },
        tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.x} Stellplätze` } },
        datalabels: { color: '#fff', font: { size: 12, weight: '600' }, formatter: v => v, anchor: 'center', align: 'center', display: ctx => ctx.dataset.data[ctx.dataIndex] > 10 },
      },
      scales: {
        x: { stacked: true, ticks: { font: { size: 11 } }, grid: { color: '#e8ebee' } },
        y: { stacked: true, ticks: { font: { size: 11 } }, grid: { display: false } },
      } },
  });
}

async function initInnenstadtAuslastung() {
  const rows = await loadCsv('data/innenstadt_parkhaus_auslastung_exemplarisch.csv');
  const data = rows.filter(r => r['Datum']);
  new Chart(document.getElementById('chart'), {
    type: 'bar',
    plugins: [ChartDataLabels],
    data: { labels: data.map(r => r['Datum']),
      datasets: [
        { label: 'Frei',   data: data.map(r => r[Object.keys(r)[1]]), backgroundColor: COLORS.gruen, barPercentage: 0.75, categoryPercentage: 0.6 },
        { label: 'Belegt', data: data.map(r => r[Object.keys(r)[2]]), backgroundColor: COLORS.rot,   barPercentage: 0.75, categoryPercentage: 0.6 },
      ] },
    options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y',
      plugins: {
        legend: { labels: { font: { size: 11 }, boxWidth: 13, padding: 14 } },
        tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.x} %` } },
        datalabels: { color: '#fff', font: { size: 12, weight: '600' }, formatter: v => v + ' %', anchor: 'center', align: 'center', display: ctx => ctx.dataset.data[ctx.dataIndex] > 10 },
      },
      scales: {
        x: { stacked: true, max: 100, ticks: { callback: v => v + ' %', font: { size: 11 } }, grid: { color: '#e8ebee' } },
        y: { stacked: true, ticks: { font: { size: 11 } }, grid: { display: false } },
      } },
  });
}

async function initLizenzenEuropa() {
  const rows = await loadCsv('data/parklizenzen_europa.csv');
  const sorted = [...rows].filter(r => r['Jahresgebühr']).sort((a,b) => a['Jahresgebühr'] - b['Jahresgebühr']);
  new Chart(document.getElementById('chart'), {
    type: 'bar',
    data: { labels: sorted.map(r => r['Stadt']),
      datasets: [{ label: 'Jahresgebühr (€)', data: sorted.map(r => r['Jahresgebühr']),
        backgroundColor: sorted.map(r => r['Stadt'] === 'München' ? COLORS.rot : COLORS.blau), barThickness: 28 }] },
    options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y',
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.x} €` } } },
      scales: {
        x: { ticks: { callback: v => v + ' €', font: { size: 11 } }, grid: { color: '#e8ebee' } },
        y: { ticks: { font: { size: 11 } }, grid: { display: false } },
      } },
  });
}

async function initTblParkscheibe(valueKey) {
  const psRows = await loadCsv('data/kalkulation_parkscheibe_parkschein.csv');
  const canvas = document.getElementById('chart');
  const div = document.createElement('div');
  div.style.cssText = 'width:100%;height:100%;overflow-y:auto';
  canvas.parentNode.replaceChild(div, canvas);
  const tbl = document.createElement('table');
  tbl.className = 'ps-table';
  tbl.innerHTML = '<thead><tr><th>Auslastung</th><th class="col-val">Einnahmen</th></tr></thead>';
  psRows.forEach(r => {
    const pct = Number(r['Auslastung in %']);
    const tr = document.createElement('tr');
    if (pct === 50) tr.className = 'row-realistic';
    tr.innerHTML = `<td><span class="pct-badge">${pct} %</span></td><td class="col-val">${r[valueKey]}</td>`;
    tbl.appendChild(tr);
  });
  div.appendChild(tbl);
}
async function initTblParkscheibePlatz() { await initTblParkscheibe('Tageseinnahme'); }
async function initTblParkscheibeAlle()  { await initTblParkscheibe('Tageseinnahme alle'); }

async function initParkscheibeJahr() {
  const rows = await loadCsv('data/kalkulation_parkscheibe_parkschein.csv');
  function parseDE(s) {
    return parseFloat(String(s).replace(/\./g, '').replace(',', '.').replace(/[^0-9.]/g, ''));
  }
  const fmtMio = v => (v / 1e6).toLocaleString('de-DE', { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + ' Mio. €';
  new Chart(document.getElementById('chart'), {
    type: 'bar',
    plugins: [ChartDataLabels],
    data: {
      labels: rows.map(r => Number(r['Auslastung in %']) + ' %'),
      datasets: [{
        data: rows.map(r => parseDE(r['Jahreseinnahmen alle'])),
        backgroundColor: rows.map(r => Number(r['Auslastung in %']) === 50 ? '#1e8a3e' : '#2c2fdf'),
      }],
    },
    options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y',
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => {
          const r = rows[ctx.dataIndex];
          return [' ' + fmtMio(ctx.parsed.x), ' 1 Platz/Tag: ' + r['Tageseinnahme'], ' Alle/Tag: ' + r['Tageseinnahme alle']];
        }}},
        datalabels: {
          anchor: 'end', align: 'end',
          formatter: fmtMio,
          font: { size: 12, weight: '600' },
          color: ctx => Number(rows[ctx.dataIndex]['Auslastung in %']) === 50 ? '#1e8a3e' : '#2c2fdf',
        },
      },
      scales: {
        x: { max: 145000000,
          ticks: { callback: v => (v / 1e6).toLocaleString('de-DE') + ' Mio.', font: { size: 11 } },
          grid: { color: '#e8ebee' } },
        y: { title: { display: true, text: 'Auslastung', font: { size: 11 }, color: '#62707c' }, ticks: { font: { size: 11 } }, grid: { display: false } },
      },
    },
  });
}

async function initLizenzEinnahmen() {
  const rows = await loadCsv('data/kalkulation_parklizenz_preise.csv');
  const fmtMio = v => (v / 1e6).toLocaleString('de-DE', { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + ' Mio. €';
  const labels = rows.map(r => [r['Stadt'].trim(), Number(r['Preis/Jahr']).toLocaleString('de-DE') + ' €/Jahr']);
  const values = rows.map(r => Number(r['Preis/Jahr']) * Number(r['Lizenzen vergeben']));
  const colors = rows.map(r => r['Stadt'].trim() === 'München' ? '#e8384f' : '#2c2fdf');
  const xMax   = Math.ceil(Math.max(...values) * 1.4 / 1e6) * 1e6;
  const el = document.getElementById('chart');
  if (el) el.height = rows.length * 50;
  new Chart(document.getElementById('chart'), {
    type: 'bar',
    plugins: [ChartDataLabels],
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: colors,
        barThickness: 28,
      }],
    },
    options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y',
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ' ' + fmtMio(ctx.parsed.x) } },
        datalabels: {
          anchor: 'end', align: 'end',
          formatter: fmtMio,
          font: { size: 12, weight: '600' },
          color: '#2c2fdf',
        },
      },
      scales: {
        x: { max: xMax,
          ticks: { callback: v => (v / 1e6).toLocaleString('de-DE') + ' Mio.', font: { size: 11 } },
          grid: { color: '#e8ebee' } },
        y: { ticks: { font: { size: 11 } }, grid: { display: false } },
      },
    },
  });
}

async function initOeffentlicherRaum() {
  const rows = await loadCsv('data/oeffentlicher_raum.csv');
  const sorted = [...rows].filter(r => r['Kosten']).sort((a,b) => a['Kosten'] - b['Kosten']);
  new Chart(document.getElementById('chart'), {
    type: 'bar',

async function initPreis() {
  const numDE = v => { const s = (v||'').toString().replace(/\s/g,'').replace(',','.'); return s===''?null:(parseFloat(s)||null); };
  const preisRows = await loadCsv('data/preissteigerung_oepnv_parken.csv');
  const cols = ['Streifenkarte', 'Deutschlandticket', 'Parkraum Lizenz'];
  const colLabels = ['Streifenkarte MVV', 'Deutschlandticket', 'Parkraum-Lizenz'];
  const colUnits  = ['€/Karte', '€/Monat', '€/Jahr'];
  const thenVals = [], nowVals = [], thenYears = [];
  cols.forEach(col => {
    const entries = preisRows.map(r => ({ jahr: parseInt(r['Jahr']), val: numDE(r[col]) })).filter(e => e.val !== null);
    thenVals.push(entries[0]?.val ?? 0);
    nowVals.push(entries[entries.length - 1]?.val ?? 0);
    thenYears.push(entries[0]?.jahr ?? '');
  });
  const catColors = [COLORS.blau, COLORS.gruen, '#f59e0b'];
  const pcts = nowVals.map((v, i) => +((v / thenVals[i] - 1) * 100).toFixed(0));
  const changeLabelPlugin = {
    id: 'changeLabel',
    afterDatasetsDraw(chart) {
      const ctx = chart.ctx;
      chart.getDatasetMeta(1).data.forEach((bar, i) => {
        const p = pcts[i];
        ctx.save();
        ctx.font = 'bold 12px system-ui, sans-serif';
        ctx.fillStyle = p === 0 ? '#f59e0b' : '#1e293b';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText((p > 0 ? '+' : '') + p + ' %', bar.x, bar.y - 6);
        ctx.restore();
      });
    },
  };
  new Chart(document.getElementById('chart'), {
    type: 'bar',
    plugins: [changeLabelPlugin],
    data: {
      labels: cols.map((_, i) => [colLabels[i], `(${colUnits[i]}, ab ${thenYears[i]})`]),
      datasets: [
        { label: 'Startpreis', data: thenVals,
          backgroundColor: catColors.map(c => c + '55'), borderColor: catColors, borderWidth: 1 },
        { label: '2026', data: nowVals,
          backgroundColor: catColors, borderColor: catColors, borderWidth: 1 },
      ],
    },
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{labels:{font:{size:11},boxWidth:13,padding:14}},
        tooltip:{callbacks:{
          title: ctx => ctx[0].label,
          label: ctx=>' '+ctx.dataset.label+': '+ctx.parsed.y.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €',
        }},
      },
      scales:{
        x:{...xBase, ticks:{font:{size:11},maxRotation:0}},
        y:{ticks:{callback:v=>v+' €',font:{size:11}},grid:{color:'#e8ebee'},beginAtZero:true},
      },
    },
  });
}

async function initWachstum() {
  const [pkwRows, bevRows] = await Promise.all([
    loadCsv('data/pkw_bestand.csv'),
    loadCsv('data/bevoelkerung_ab_1900_stand_2024.csv'),
  ]);
  const pkwBase   = num((pkwRows.find(r => trim(r['Jahr']) === '2010') ?? {})['PKW-Bestand']);
  const pkwLast   = num((pkwRows.filter(r => +trim(r['Jahr']) <= 2024).at(-1) ?? {})['PKW-Bestand']);
  const bev2010   = bevRows.find(r => String(r['jahr']) === '2010');
  const bevLast   = bevRows.at(-1);
  const bevGrowth = +((Number(bevLast?.['einwohner_Insgesamt']) / Number(bev2010?.['einwohner_Insgesamt']) - 1) * 100).toFixed(1);
  const pkwGrowth = +((pkwLast / pkwBase - 1) * 100).toFixed(1);

  const barLabelPlugin = {
    id: 'barLabel',
    afterDatasetsDraw(chart) {
      const ctx = chart.ctx;
      chart.data.datasets.forEach((ds, i) => {
        chart.getDatasetMeta(i).data.forEach((bar, j) => {
          const v = ds.data[j];
          ctx.save();
          ctx.fillStyle = '#1e293b';
          ctx.font = 'bold 15px system-ui, sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'bottom';
          ctx.fillText((v >= 0 ? '+' : '') + v.toFixed(1) + ' %', bar.x, bar.y - 6);
          ctx.restore();
        });
      });
    },
  };

  new Chart(document.getElementById('chart'), {
    type: 'bar',
    plugins: [barLabelPlugin],
    data: {
      labels: ['Bevölkerung', 'PKW-Bestand'],
      datasets: [{ data: [bevGrowth, pkwGrowth], backgroundColor: [COLORS.gruen, COLORS.dunkelblau], barThickness: 72 }],
    },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ' ' + (ctx.parsed.y >= 0 ? '+' : '') + ctx.parsed.y + ' %' } } },
      scales: {
        y: { ticks: { callback: v => (v >= 0 ? '+' : '') + v + ' %', font: { size: 11 } }, grid: { color: '#e8ebee' }, beginAtZero: true },
        x: { ticks: { font: { size: 13 }, color: '#1e293b' }, grid: { display: false } },
      } },
  });
}
